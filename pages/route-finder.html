<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Route Finder — SahiSafar</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
.search-wrap{position:relative}
.search-input{width:100%;padding:12px 40px 12px 14px;border:1.5px solid rgba(26,35,126,0.25);border-radius:12px;font-size:14px;font-family:inherit;color:#0D0F1A;background:#fff;outline:none;transition:border .15s}
.search-input:focus{border-color:#3949AB;box-shadow:0 0 0 3px rgba(57,73,171,0.12)}
.search-input::placeholder{color:#aaa}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;color:#aaa}
.drop-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid rgba(26,35,126,0.15);border-radius:12px;max-height:240px;overflow-y:auto;z-index:9999;box-shadow:0 8px 32px rgba(26,35,126,0.15);display:none}
.drop-list.show{display:block}
.drop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13.5px;cursor:pointer;border-bottom:1px solid rgba(26,35,126,0.05);transition:background .1s}
.drop-item:last-child{border-bottom:none}
.drop-item:hover{background:#ECEEF6}
.drop-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.drop-item .sname{flex:1;color:#0D0F1A;font-weight:500}
.drop-item .lname{font-size:11px;color:#aaa;flex-shrink:0}
.no-res{padding:14px;text-align:center;font-size:13px;color:#aaa}
.selected-station{display:flex;align-items:center;gap:8px;background:#E8F0FE;border:1.5px solid #C5D8FF;border-radius:10px;padding:9px 12px;margin-top:6px}
.selected-station .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.selected-station .sname{flex:1;font-size:13.5px;font-weight:600;color:#1A237E}
.selected-station .lbadge{font-size:11px;background:#1A237E;color:#fff;border-radius:5px;padding:2px 7px}
.selected-station .clr{cursor:pointer;font-size:18px;color:#aaa;line-height:1;margin-left:4px}
.selected-station .clr:hover{color:#C62828}
.swap-btn{width:100%;padding:8px;background:none;border:1.5px dashed rgba(26,35,126,0.2);border-radius:10px;font-family:inherit;font-size:13px;color:#3949AB;cursor:pointer;transition:all .15s;margin:8px 0}
.swap-btn:hover{background:#ECEEF6}
</style>
</head>
<body>
<div id="navPlaceholder"></div>
<main>
<div class="container">

  <!-- SEARCH CARD -->
  <div class="card fade-in" style="margin-bottom:1rem">
    <div class="page-section-title">🗺 Route Finder</div>

    <div class="field" style="margin-bottom:12px">
      <label>From Station</label>
      <div class="search-wrap" id="fromWrap">
        <input class="search-input" id="fromInput" type="text" placeholder="🔍 Type station name e.g. Rajiv Chowk..." autocomplete="off"/>
        <span class="search-icon">🔍</span>
        <div class="drop-list" id="fromDrop"></div>
      </div>
      <div id="fromSelected" style="display:none"></div>
    </div>

    <button class="swap-btn" onclick="swapStations()">⇅ Swap From & To</button>

    <div class="field" style="margin-bottom:12px">
      <label>To Station</label>
      <div class="search-wrap" id="toWrap">
        <input class="search-input" id="toInput" type="text" placeholder="🔍 Type station name e.g. Meerut Central..." autocomplete="off"/>
        <span class="search-icon">🔍</span>
        <div class="drop-list" id="toDrop"></div>
      </div>
      <div id="toSelected" style="display:none"></div>
    </div>

    <div class="field" style="margin-bottom:14px">
      <label>Or Search by Landmark</label>
      <div class="search-wrap">
        <input class="search-input" id="landmarkInput" type="text" placeholder="India Gate, AIIMS, Airport, JNU..."/>
        <span class="search-icon">🏛</span>
      </div>
      <div id="landmarkHint" style="font-size:12px;color:#1A237E;margin-top:5px;min-height:16px"></div>
    </div>

    <button class="btn btn-primary btn-full" id="findBtn">🔍 Find My Route</button>
  </div>

  <!-- RESULT AREA -->
  <div id="resultArea">
    <div class="empty-state">
      <div class="empty-icon">🚇</div>
      <p>Search your stations above and tap <strong>Find Route</strong>.</p>
    </div>
  </div>

  <!-- POPULAR ROUTES — always below result -->
  <div id="popularSection" class="page-section" style="margin-top:1.5rem">
    <div class="page-section-title">Popular Routes</div>
    <div class="quick-grid">
      <button class="quick-btn" onclick="setQ('New Delhi','Rajiv Chowk')"><span class="q-label">Quick</span>New Delhi → Rajiv Chowk</button>
      <button class="quick-btn" onclick="setQ('Kashmere Gate','Huda City Centre')"><span class="q-label">Yellow Line</span>Kashmere Gate → Huda City Centre</button>
      <button class="quick-btn" onclick="setQ('New Delhi','IGI Airport Terminal 3')"><span class="q-label">Airport</span>New Delhi → IGI Airport</button>
      <button class="quick-btn" onclick="setQ('Anand Vihar ISBT','Meerut South')"><span class="q-label">RRTS</span>Anand Vihar → Meerut South</button>
      <button class="quick-btn" onclick="setQ('Meerut South','Meerut Central')"><span class="q-label">Meerut Metro</span>Meerut South → Meerut Central</button>
      <button class="quick-btn" onclick="setQ('Rajiv Chowk','Meerut Central')"><span class="q-label">Cross City</span>Rajiv Chowk → Meerut Central</button>
      <button class="quick-btn" onclick="setQ('Dwarka Sec-21','Botanical Garden')"><span class="q-label">Blue Line</span>Dwarka → Botanical Garden</button>
      <button class="quick-btn" onclick="setQ('Janakpuri West','Noida City Centre')"><span class="q-label">Cross Delhi</span>Janakpuri West → Noida</button>
    </div>
  </div>

</div>
</main>
<div id="footerPlaceholder"></div>
<script src="../js/data.js"></script>
<script src="../js/engine.js"></script>
<script src="../js/components.js"></script>
<script>
document.getElementById('navPlaceholder').innerHTML = renderNav('route');
document.getElementById('footerPlaceholder').innerHTML = renderFooter();

// Build station list
var allStations = [];
var stationLineMap = {};
var seen = new Set();
for (var lk in LINES) {
  var sts = LINES[lk].stations;
  for (var i = 0; i < sts.length; i++) {
    if (!seen.has(sts[i])) {
      seen.add(sts[i]);
      allStations.push({ name:sts[i], line:lk, color:LINES[lk].color, short:LINES[lk].shortName });
    }
    if (!stationLineMap[sts[i]]) stationLineMap[sts[i]] = { color:LINES[lk].color, short:LINES[lk].shortName };
  }
}
allStations.sort(function(a,b){ return a.name.localeCompare(b.name); });

var selectedFrom = '';
var selectedTo = '';

// ── SEARCH COMPONENT ─────────────────────────
function initSearch(inputId, dropId, selectedId, onPick) {
  var inp = document.getElementById(inputId);
  var drop = document.getElementById(dropId);
  var sel = document.getElementById(selectedId);

  function renderList(query) {
    var q = query.toLowerCase().trim();
    var results = q === ''
      ? allStations.slice(0, 80)
      : allStations.filter(function(s){ return s.name.toLowerCase().indexOf(q) !== -1; });
    if (results.length === 0) {
      drop.innerHTML = '<div class="no-res">No station found — try a different name</div>';
    } else {
      drop.innerHTML = results.slice(0,60).map(function(s){
        return '<div class="drop-item" data-name="'+s.name+'" data-color="'+s.color+'" data-short="'+s.short+'">'
          +'<div class="dot" style="background:'+s.color+'"></div>'
          +'<div class="sname">'+s.name+'</div>'
          +'<div class="lname">'+s.short+' Line</div>'
          +'</div>';
      }).join('');
      var items = drop.querySelectorAll('.drop-item');
      for (var i = 0; i < items.length; i++) {
        items[i].addEventListener('mousedown', function(e){
          e.preventDefault();
          pickStation(this.getAttribute('data-name'), this.getAttribute('data-color'), this.getAttribute('data-short'));
        });
      }
    }
    drop.classList.add('show');
  }

  function pickStation(name, color, short) {
    onPick(name);
    inp.value = '';
    drop.classList.remove('show');
    sel.style.display = 'flex';
    sel.innerHTML = '<div class="selected-station">'
      +'<div class="dot" style="background:'+color+'"></div>'
      +'<div class="sname">'+name+'</div>'
      +'<div class="lbadge">'+short+'</div>'
      +'<div class="clr" onclick="clearSt(\''+selectedId+'\',\''+inputId+'\')">✕</div>'
      +'</div>';
  }

  inp.addEventListener('focus', function(){ renderList(this.value); });
  inp.addEventListener('input', function(){ renderList(this.value); });
  inp.addEventListener('blur', function(){ setTimeout(function(){ drop.classList.remove('show'); }, 150); });
}

function clearSt(selId, inpId) {
  if (selId === 'fromSelected') selectedFrom = '';
  else selectedTo = '';
  document.getElementById(selId).style.display = 'none';
  document.getElementById(selId).innerHTML = '';
  document.getElementById(inpId).value = '';
}

initSearch('fromInput','fromDrop','fromSelected', function(n){ selectedFrom = n; });
initSearch('toInput','toDrop','toSelected', function(n){ selectedTo = n; });

// Close dropdowns on outside click
document.addEventListener('click', function(e){
  if (!document.getElementById('fromWrap').contains(e.target)) document.getElementById('fromDrop').classList.remove('show');
  if (!document.getElementById('toWrap').contains(e.target)) document.getElementById('toDrop').classList.remove('show');
});

// ── LANDMARK ─────────────────────────────────
document.getElementById('landmarkInput').addEventListener('input', function(){
  var v = this.value;
  var h = document.getElementById('landmarkHint');
  if (!v.trim()) { h.textContent = ''; return; }
  var m = resolveLandmark(v);
  if (m) {
    h.textContent = '📍 Nearest station: ' + m;
    var info = stationLineMap[m] || {color:'#1A237E',short:'Metro'};
    selectedTo = m;
    var sel = document.getElementById('toSelected');
    sel.style.display = 'flex';
    sel.innerHTML = '<div class="selected-station"><div class="dot" style="background:'+info.color+'"></div><div class="sname">'+m+'</div><div class="lbadge">'+info.short+'</div><div class="clr" onclick="clearSt(\'toSelected\',\'toInput\')">✕</div></div>';
  } else {
    h.textContent = 'Not found. Try: India Gate, AIIMS, Airport...';
  }
});

// ── SWAP ──────────────────────────────────────
function swapStations() {
  var tf = selectedFrom, tt = selectedTo;
  if (!tf && !tt) return;
  clearSt('fromSelected','fromInput');
  clearSt('toSelected','toInput');
  if (tt) {
    var info = stationLineMap[tt]||{color:'#1A237E',short:'Metro'};
    selectedFrom = tt;
    var s = document.getElementById('fromSelected');
    s.style.display='flex';
    s.innerHTML='<div class="selected-station"><div class="dot" style="background:'+info.color+'"></div><div class="sname">'+tt+'</div><div class="lbadge">'+info.short+'</div><div class="clr" onclick="clearSt(\'fromSelected\',\'fromInput\')">✕</div></div>';
  }
  if (tf) {
    var info = stationLineMap[tf]||{color:'#1A237E',short:'Metro'};
    selectedTo = tf;
    var s = document.getElementById('toSelected');
    s.style.display='flex';
    s.innerHTML='<div class="selected-station"><div class="dot" style="background:'+info.color+'"></div><div class="sname">'+tf+'</div><div class="lbadge">'+info.short+'</div><div class="clr" onclick="clearSt(\'toSelected\',\'toInput\')">✕</div></div>';
  }
}

// ── QUICK ROUTES ──────────────────────────────
function setQ(f, t) {
  clearSt('fromSelected','fromInput');
  clearSt('toSelected','toInput');
  var cf = stationLineMap[f]||{color:'#1A237E',short:'Metro'};
  var ct = stationLineMap[t]||{color:'#1A237E',short:'Metro'};
  selectedFrom = f;
  selectedTo = t;
  var fs = document.getElementById('fromSelected');
  fs.style.display='flex';
  fs.innerHTML='<div class="selected-station"><div class="dot" style="background:'+cf.color+'"></div><div class="sname">'+f+'</div><div class="lbadge">'+cf.short+'</div><div class="clr" onclick="clearSt(\'fromSelected\',\'fromInput\')">✕</div></div>';
  var ts = document.getElementById('toSelected');
  ts.style.display='flex';
  ts.innerHTML='<div class="selected-station"><div class="dot" style="background:'+ct.color+'"></div><div class="sname">'+t+'</div><div class="lbadge">'+ct.short+'</div><div class="clr" onclick="clearSt(\'toSelected\',\'toInput\')">✕</div></div>';
  doFind();
}

// ── URL PARAMS ────────────────────────────────
var params = new URLSearchParams(window.location.search);
if (params.get('from') && params.get('to')) setQ(params.get('from'), params.get('to'));

// ── FIND ROUTE ────────────────────────────────
document.getElementById('findBtn').onclick = function(){ doFind(); };

function doFind() {
  var from = selectedFrom;
  var to = selectedTo;
  var area = document.getElementById('resultArea');
  var popular = document.getElementById('popularSection');

  if (!from || !to) { area.innerHTML = '<div class="error-card">Please select both From and To stations.</div>'; return; }
  if (from === to) { area.innerHTML = '<div class="error-card">From and To cannot be the same station.</div>'; return; }

  area.innerHTML = '<div class="loading"><span class="spinner"></span>Finding your SahiSafar...</div>';

  // Hide popular while loading
  popular.style.display = 'none';

  setTimeout(function(){
    var graph = buildGraph();
    var result = dijkstra(graph, from, to);

    if (!result) {
      area.innerHTML = '<div class="error-card">No route found. These stations may not be connected in current network.</div>';
      popular.style.display = 'block';
      return;
    }

    var path = result.path;
    var segments = buildSegments(path);

    if (!segments || segments.length === 0) {
      area.innerHTML = '<div class="error-card">Could not build route segments. Please try again.</div>';
      popular.style.display = 'block';
      return;
    }

    var stops = path.length - 1;
    var interchanges = segments.length - 1;
    var mins = Math.round(stops * 2.5 + interchanges * 5);

    // TOTAL FARE = all segments added
    var totalFare = 0;
    var fareBreakdown = [];
    for (var fi = 0; fi < segments.length; fi++) {
      var sf = calculateFare(segments[fi].stations.length - 1, segments[fi].line);
      totalFare += sf.fare;
      fareBreakdown.push(LINES[segments[fi].line].shortName + ' ₹' + sf.fare);
    }

    var crowd = getCrowdLevel();
    var crowdLevel = CROWD_SCHEDULE[crowd.isWeekend ? 'weekend' : 'weekday'][crowd.hour];

    var html = '<div class="card fade-in" style="margin-bottom:1rem">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:1rem">';
    html += '<div><div style="font-size:17px;font-weight:700">'+from+' → '+to+'</div>';
    html += '<div style="font-size:12px;color:#767B99;margin-top:2px">'+LINES[segments[0].line].name+(interchanges>0?' + '+interchanges+' interchange(s)':'')+'</div></div>';
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
    html += '<span class="chip chip-info">🚉 '+stops+' stops</span>';
    html += '<span class="chip chip-success">⏱ ~'+mins+' min</span>';
    html += '<span class="chip chip-warning">💰 ₹'+totalFare+'</span>';
    html += '<span class="chip" style="background:'+CROWD_COLORS[crowdLevel]+'20;color:'+CROWD_COLORS[crowdLevel]+'">'+CROWD_EMOJIS[crowdLevel]+' '+CROWD_LABELS[crowdLevel]+'</span>';
    html += '</div></div>';

    // Fare breakdown if multi-line
    if (fareBreakdown.length > 1) {
      html += '<div style="background:#E8F5E9;border-radius:8px;padding:8px 12px;font-size:12.5px;color:#1B5E20;margin-bottom:12px">';
      html += '💰 Fare breakdown: '+fareBreakdown.join(' + ')+' = <strong>Total ₹'+totalFare+'</strong></div>';
    }

    html += '<div style="overflow-x:auto;padding:1rem 0"><div style="display:flex;align-items:flex-start;min-width:max-content" id="track"></div></div>';
    html += '<div id="segList" style="margin-top:1rem"></div>';
    html += '</div>';

    // AI Tips
    var tips = generateAITips(segments, path, from, to);
    html += '<div class="card fade-in">';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">';
    html += '<span style="background:#1A237E;color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700">AI TIPS</span>';
    html += '<span style="font-size:14px;font-weight:600">Smart Travel Advice</span></div>';
    html += '<div style="display:flex;flex-direction:column;gap:8px">';
    for (var i = 0; i < tips.length; i++) {
      html += '<div class="tip-card '+tips[i].color+'"><span style="font-size:16px;flex-shrink:0">'+tips[i].icon+'</span><div>'+tips[i].text+'</div></div>';
    }
    html += '</div></div>';

    area.innerHTML = html;

    // Show popular BELOW result
    popular.style.display = 'block';

    // Build visual track
    var track = document.getElementById('track');
    for (var si = 0; si < segments.length; si++) {
      var seg = segments[si];
      var ld = LINES[seg.line];
      for (var i = 0; i < seg.stations.length; i++) {
        var isEnd = (si===0&&i===0)||(si===segments.length-1&&i===seg.stations.length-1);
        var isChange = (i===seg.stations.length-1)&&(si<segments.length-1);
        var d = document.createElement('div');
        d.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:5px';
        d.innerHTML = '<div style="width:'+(isEnd?20:14)+'px;height:'+(isEnd?20:14)+'px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 2.5px '+ld.color+';background:'+(isEnd?ld.color:'#fff')+'"></div>'
          +'<div style="font-size:11px;max-width:72px;text-align:center;line-height:1.35;font-weight:'+((i===0||i===seg.stations.length-1)?'600':'400')+';color:'+((i===0||i===seg.stations.length-1)?'#0D0F1A':'#767B99')+'">'+seg.stations[i]
          +(isChange?'<div style="background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;border-radius:4px;font-size:9px;padding:1px 5px;margin-top:2px">Change here</div>':'')
          +'</div>';
        track.appendChild(d);
        if (i < seg.stations.length-1) {
          var b = document.createElement('div');
          b.style.cssText = 'height:5px;width:44px;border-radius:3px;background:'+ld.color+';flex-shrink:0;margin-top:7px';
          track.appendChild(b);
        }
      }
      if (si < segments.length-1) {
        var dash = document.createElement('div');
        dash.style.cssText = 'width:44px;border-top:3px dashed #ccc;flex-shrink:0;margin-top:10px';
        track.appendChild(dash);
      }
    }

    // Segment list
    var segList = document.getElementById('segList');
    for (var si = 0; si < segments.length; si++) {
      var seg = segments[si];
      var ld = LINES[seg.line];
      var sf = calculateFare(seg.stations.length-1, seg.line);
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(26,35,126,0.12)';
      row.innerHTML = '<div style="width:16px;height:16px;border-radius:50%;background:'+ld.color+';flex-shrink:0"></div>'
        +'<div style="flex:1"><strong style="font-size:14px">'+ld.name+'</strong>'
        +'<div style="font-size:12.5px;color:#767B99">Board at <em>'+seg.stations[0]+'</em> → Alight at <em>'+seg.stations[seg.stations.length-1]+'</em></div>'
        +'<div style="font-size:11px;color:#1A237E;margin-top:2px">Fare: ₹'+sf.fare+' ('+sf.note+')</div></div>'
        +'<div style="font-size:12px;font-weight:600;color:#1A237E;background:#ECEEF6;border-radius:6px;padding:3px 8px">'+(seg.stations.length-1)+' stops</div>';
      segList.appendChild(row);
    }

    // Scroll to result smoothly
    area.scrollIntoView({ behavior: 'smooth', block: 'start' });

  }, 400);
}
</script>
</body>
</html>
