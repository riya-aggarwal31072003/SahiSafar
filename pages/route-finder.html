<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Route Finder — SahiSafar</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
.search-box{position:relative;width:100%}
.search-box input{width:100%;padding:11px 14px;border:1.5px solid rgba(26,35,126,0.25);border-radius:12px;font-size:14px;font-family:inherit;color:#0D0F1A;background:#fff;outline:none}
.search-box input:focus{border-color:#3949AB;box-shadow:0 0 0 3px rgba(57,73,171,0.12)}
.search-box input::placeholder{color:#aaa}
.dropdown-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid rgba(26,35,126,0.2);border-radius:12px;max-height:220px;overflow-y:auto;z-index:999;box-shadow:0 8px 24px rgba(26,35,126,0.15);display:none;margin-top:4px}
.dropdown-list.open{display:block}
.dropdown-item{padding:10px 14px;font-size:13.5px;cursor:pointer;color:#0D0F1A;border-bottom:1px solid rgba(26,35,126,0.06);transition:background .12s}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover,.dropdown-item.active{background:#ECEEF6;color:#1A237E;font-weight:600}
.dropdown-item .line-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:middle}
.selected-tag{display:inline-flex;align-items:center;gap:6px;background:#E3F2FD;color:#1A237E;border-radius:8px;padding:5px 10px;font-size:13px;font-weight:600;margin-top:6px;min-height:28px}
.selected-tag .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.selected-tag .clear{cursor:pointer;color:#767B99;font-size:16px;line-height:1;margin-left:4px}
.selected-tag .clear:hover{color:#C62828}
.no-results{padding:12px 14px;font-size:13px;color:#767B99;text-align:center}
</style>
</head>
<body>
<div id="navPlaceholder"></div>
<main>
<div class="container">
  <div class="card fade-in" style="margin-bottom:1rem">
    <div class="page-section-title">🗺 Route Finder</div>
    <div class="form-row-2">
      <div class="field">
        <label>From Station</label>
        <div class="search-box" id="fromBox">
          <input type="text" id="fromInput" placeholder="🔍 Type station name..." autocomplete="off"/>
          <div class="dropdown-list" id="fromDropdown"></div>
        </div>
        <div id="fromTag" class="selected-tag" style="display:none"></div>
      </div>
      <div class="field">
        <label>To Station</label>
        <div class="search-box" id="toBox">
          <input type="text" id="toInput" placeholder="🔍 Type station name..." autocomplete="off"/>
          <div class="dropdown-list" id="toDropdown"></div>
        </div>
        <div id="toTag" class="selected-tag" style="display:none"></div>
      </div>
    </div>
    <div class="field" style="margin-bottom:12px;margin-top:12px">
      <label>Or Search by Landmark</label>
      <input type="text" id="landmarkInput" placeholder="India Gate, AIIMS, Airport, Meerut Central..."/>
      <div id="landmarkHint" style="font-size:12px;color:#1A237E;margin-top:4px;min-height:16px"></div>
    </div>
    <button class="btn btn-primary btn-full" id="findBtn">🔍 Find Route</button>
  </div>

  <div class="quick-grid" style="margin-bottom:1rem">
    <button class="quick-btn" id="q1"><span class="q-label">Quick</span>New Delhi → Rajiv Chowk</button>
    <button class="quick-btn" id="q2"><span class="q-label">Yellow Line</span>Kashmere Gate → Huda City Centre</button>
    <button class="quick-btn" id="q3"><span class="q-label">Airport</span>New Delhi → IGI Airport</button>
    <button class="quick-btn" id="q4"><span class="q-label">RRTS</span>Anand Vihar ISBT → Meerut South</button>
    <button class="quick-btn" id="q5"><span class="q-label">Meerut Metro</span>Meerut South → Meerut Central</button>
    <button class="quick-btn" id="q6"><span class="q-label">Cross City</span>Rajiv Chowk → Meerut Central</button>
  </div>

  <div id="resultArea">
    <div class="empty-state">
      <div class="empty-icon">🚇</div>
      <p>Search your stations above and tap <strong>Find Route</strong>.</p>
    </div>
  </div>
</div>
</main>
<div id="footerPlaceholder"></div>
<script src="../js/data.js"></script>
<script src="../js/engine.js"></script>
<script src="../js/components.js"></script>
<script>
document.getElementById('navPlaceholder').innerHTML = renderNav('route');
document.getElementById('footerPlaceholder').innerHTML = renderFooter();

// Build station list with line info
var allStations = [];
var stationLineMap = {};
var stationSet = new Set();
for (var lk in LINES) {
  var sts = LINES[lk].stations;
  for (var i = 0; i < sts.length; i++) {
    if (!stationSet.has(sts[i])) {
      stationSet.add(sts[i]);
      allStations.push({ name: sts[i], line: lk, color: LINES[lk].color });
    }
    if (!stationLineMap[sts[i]]) stationLineMap[sts[i]] = { line: lk, color: LINES[lk].color };
  }
}
allStations.sort(function(a, b) { return a.name.localeCompare(b.name); });

// Selected values
var selectedFrom = '';
var selectedTo = '';

function getLineColor(station) {
  return stationLineMap[station] ? stationLineMap[station].color : '#1A237E';
}

function buildDropdown(inputId, dropdownId, tagId, onSelect) {
  var input = document.getElementById(inputId);
  var dropdown = document.getElementById(dropdownId);
  var tag = document.getElementById(tagId);

  function showDropdown(filter) {
    var filtered = allStations.filter(function(s) {
      return s.name.toLowerCase().indexOf(filter.toLowerCase()) !== -1;
    });
    if (filtered.length === 0) {
      dropdown.innerHTML = '<div class="no-results">No station found. Try different name.</div>';
    } else {
      dropdown.innerHTML = filtered.slice(0, 50).map(function(s) {
        return '<div class="dropdown-item" data-name="' + s.name + '">'
          + '<span class="line-dot" style="background:' + s.color + '"></span>'
          + s.name + '<span style="font-size:10px;color:#aaa;margin-left:6px">' + LINES[s.line].shortName + '</span>'
          + '</div>';
      }).join('');
    }
    dropdown.classList.add('open');

    // Click on item
    var items = dropdown.querySelectorAll('.dropdown-item');
    for (var i = 0; i < items.length; i++) {
      items[i].addEventListener('click', function() {
        var name = this.getAttribute('data-name');
        onSelect(name);
        dropdown.classList.remove('open');
        input.value = '';
      });
    }
  }

  input.addEventListener('input', function() {
    if (this.value.trim() === '') {
      dropdown.classList.remove('open');
      return;
    }
    showDropdown(this.value);
  });

  input.addEventListener('focus', function() {
    if (this.value.trim() !== '') showDropdown(this.value);
    else showDropdown('');
  });

  // Close on outside click
  document.addEventListener('click', function(e) {
    if (!document.getElementById(inputId.replace('Input','Box')) && !dropdown.contains(e.target) && e.target !== input) {
      dropdown.classList.remove('open');
    }
  });
}

// From station
buildDropdown('fromInput', 'fromDropdown', 'fromTag', function(name) {
  selectedFrom = name;
  var color = getLineColor(name);
  var tag = document.getElementById('fromTag');
  tag.style.display = 'inline-flex';
  tag.innerHTML = '<span class="dot" style="background:' + color + '"></span>' + name
    + '<span class="clear" onclick="clearFrom()">✕</span>';
});

// To station
buildDropdown('toInput', 'toDropdown', 'toTag', function(name) {
  selectedTo = name;
  var color = getLineColor(name);
  var tag = document.getElementById('toTag');
  tag.style.display = 'inline-flex';
  tag.innerHTML = '<span class="dot" style="background:' + color + '"></span>' + name
    + '<span class="clear" onclick="clearTo()">✕</span>';
});

function clearFrom() {
  selectedFrom = '';
  document.getElementById('fromTag').style.display = 'none';
  document.getElementById('fromTag').innerHTML = '';
  document.getElementById('fromInput').value = '';
}
function clearTo() {
  selectedTo = '';
  document.getElementById('toTag').style.display = 'none';
  document.getElementById('toTag').innerHTML = '';
  document.getElementById('toInput').value = '';
}

// Close dropdowns on outside click
document.addEventListener('click', function(e) {
  if (!document.getElementById('fromBox').contains(e.target)) {
    document.getElementById('fromDropdown').classList.remove('open');
  }
  if (!document.getElementById('toBox').contains(e.target)) {
    document.getElementById('toDropdown').classList.remove('open');
  }
});

// Landmark search
document.getElementById('landmarkInput').addEventListener('input', function() {
  var v = this.value;
  var h = document.getElementById('landmarkHint');
  if (!v.trim()) { h.textContent = ''; return; }
  var m = resolveLandmark(v);
  if (m) {
    h.textContent = 'Nearest station: ' + m;
    selectedTo = m;
    var color = getLineColor(m);
    var tag = document.getElementById('toTag');
    tag.style.display = 'inline-flex';
    tag.innerHTML = '<span class="dot" style="background:' + color + '"></span>' + m
      + '<span class="clear" onclick="clearTo()">✕</span>';
  } else {
    h.textContent = 'Not found. Try: India Gate, AIIMS, Airport...';
  }
});

// Quick buttons
document.getElementById('q1').onclick = function() { setQ('New Delhi','Rajiv Chowk'); };
document.getElementById('q2').onclick = function() { setQ('Kashmere Gate','Huda City Centre'); };
document.getElementById('q3').onclick = function() { setQ('New Delhi','IGI Airport Terminal 3'); };
document.getElementById('q4').onclick = function() { setQ('Anand Vihar ISBT','Meerut South'); };
document.getElementById('q5').onclick = function() { setQ('Meerut South','Meerut Central'); };
document.getElementById('q6').onclick = function() { setQ('Rajiv Chowk','Meerut Central'); };

function setQ(f, t) {
  selectedFrom = f;
  selectedTo = t;
  var cf = getLineColor(f), ct = getLineColor(t);
  var ft = document.getElementById('fromTag'), tt = document.getElementById('toTag');
  ft.style.display = 'inline-flex';
  ft.innerHTML = '<span class="dot" style="background:' + cf + '"></span>' + f + '<span class="clear" onclick="clearFrom()">✕</span>';
  tt.style.display = 'inline-flex';
  tt.innerHTML = '<span class="dot" style="background:' + ct + '"></span>' + t + '<span class="clear" onclick="clearTo()">✕</span>';
  doFind();
}

// URL params
var params = new URLSearchParams(window.location.search);
if (params.get('from') && params.get('to')) {
  setQ(params.get('from'), params.get('to'));
}

document.getElementById('findBtn').onclick = function() { doFind(); };

function doFind() {
  var from = selectedFrom;
  var to = selectedTo;
  var area = document.getElementById('resultArea');
  if (!from || !to) { area.innerHTML = '<div class="error-card">Please select both From and To stations.</div>'; return; }
  if (from === to) { area.innerHTML = '<div class="error-card">From and To cannot be the same.</div>'; return; }
  area.innerHTML = '<div class="loading"><span class="spinner"></span>Finding your SahiSafar...</div>';

  setTimeout(function() {
    var graph = buildGraph();
    var result = dijkstra(graph, from, to);
    if (!result) {
      area.innerHTML = '<div class="error-card">No route found. These stations may not be connected in current network.</div>';
      return;
    }

    var path = result.path;
    var segments = buildSegments(path);
    if (!segments || segments.length === 0) {
      area.innerHTML = '<div class="error-card">Could not build route. Please try again.</div>';
      return;
    }

    var stops = path.length - 1;
    var interchanges = segments.length - 1;
    var mins = Math.round(stops * 2.5 + interchanges * 5);

    // TOTAL FARE = sum of all segments
    var totalFare = 0;
    var fareBreakdown = [];
    for (var fi = 0; fi < segments.length; fi++) {
      var segStops = segments[fi].stations.length - 1;
      var segFare = calculateFare(segStops, segments[fi].line);
      totalFare += segFare.fare;
      fareBreakdown.push(LINES[segments[fi].line].shortName + ' ₹' + segFare.fare);
    }

    var crowd = getCrowdLevel();
    var crowdLevel = CROWD_SCHEDULE[crowd.isWeekend ? 'weekend' : 'weekday'][crowd.hour];

    var html = '<div class="card fade-in" style="margin-bottom:1rem">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:1rem">';
    html += '<div><div style="font-size:17px;font-weight:700">' + from + ' → ' + to + '</div>';
    html += '<div style="font-size:12px;color:#767B99;margin-top:2px">' + LINES[segments[0].line].name + (segments.length > 1 ? ' + ' + interchanges + ' interchange(s)' : '') + '</div></div>';
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
    html += '<span class="chip chip-info">🚉 ' + stops + ' stops</span>';
    html += '<span class="chip chip-success">⏱ ~' + mins + ' min</span>';
    html += '<span class="chip chip-warning">💰 Total ₹' + totalFare + '</span>';
    html += '<span class="chip" style="background:' + CROWD_COLORS[crowdLevel] + '20;color:' + CROWD_COLORS[crowdLevel] + '">' + CROWD_EMOJIS[crowdLevel] + ' ' + CROWD_LABELS[crowdLevel] + '</span>';
    html += '</div></div>';

    // Fare breakdown
    if (fareBreakdown.length > 1) {
      html += '<div style="background:#E8F5E9;border-radius:8px;padding:8px 12px;font-size:12.5px;color:#1B5E20;margin-bottom:12px">';
      html += '💰 Fare breakdown: ' + fareBreakdown.join(' + ') + ' = <strong>₹' + totalFare + ' total</strong>';
      html += '</div>';
    }

    html += '<div style="overflow-x:auto;padding:1rem 0"><div style="display:flex;align-items:flex-start;min-width:max-content" id="track"></div></div>';
    html += '<div id="segList" style="margin-top:1rem"></div>';
    html += '</div>';

    // AI Tips
    var tips = generateAITips(segments, path, from, to);
    html += '<div class="card fade-in">';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">';
    html += '<span style="background:#1A237E;color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700">AI TIPS</span>';
    html += '<span style="font-size:14px;font-weight:600">Smart Travel Advice</span></div>';
    html += '<div style="display:flex;flex-direction:column;gap:8px">';
    for (var i = 0; i < tips.length; i++) {
      html += '<div class="tip-card ' + tips[i].color + '"><span style="font-size:16px;flex-shrink:0">' + tips[i].icon + '</span><div>' + tips[i].text + '</div></div>';
    }
    html += '</div></div>';

    area.innerHTML = html;

    // Build visual track
    var track = document.getElementById('track');
    for (var si = 0; si < segments.length; si++) {
      var seg = segments[si];
      var ld = LINES[seg.line];
      for (var i = 0; i < seg.stations.length; i++) {
        var st = seg.stations[i];
        var isEnd = (si === 0 && i === 0) || (si === segments.length-1 && i === seg.stations.length-1);
        var isChange = (i === seg.stations.length-1) && (si < segments.length-1);
        var d = document.createElement('div');
        d.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:5px';
        d.innerHTML = '<div style="width:' + (isEnd?20:14) + 'px;height:' + (isEnd?20:14) + 'px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 2.5px ' + ld.color + ';background:' + (isEnd?ld.color:'#fff') + '"></div>'
          + '<div style="font-size:11px;max-width:72px;text-align:center;line-height:1.35;font-weight:' + ((i===0||i===seg.stations.length-1)?'600':'400') + ';color:' + ((i===0||i===seg.stations.length-1)?'#0D0F1A':'#767B99') + '">' + st
          + (isChange ? '<div style="background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;border-radius:4px;font-size:9px;padding:1px 5px;margin-top:2px">Change here</div>' : '')
          + '</div>';
        track.appendChild(d);
        if (i < seg.stations.length-1) {
          var b = document.createElement('div');
          b.style.cssText = 'height:5px;width:44px;border-radius:3px;background:' + ld.color + ';flex-shrink:0;margin-top:7px';
          track.appendChild(b);
        }
      }
      if (si < segments.length-1) {
        var dash = document.createElement('div');
        dash.style.cssText = 'width:44px;border-top:3px dashed #ccc;flex-shrink:0;margin-top:10px';
        track.appendChild(dash);
      }
    }

    // Segment list
    var segList = document.getElementById('segList');
    for (var si = 0; si < segments.length; si++) {
      var seg = segments[si];
      var ld = LINES[seg.line];
      var segFare = calculateFare(seg.stations.length-1, seg.line);
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(26,35,126,0.12)';
      row.innerHTML = '<div style="width:16px;height:16px;border-radius:50%;background:' + ld.color + ';flex-shrink:0"></div>'
        + '<div style="flex:1"><strong style="font-size:14px">' + ld.name + '</strong>'
        + '<div style="font-size:12.5px;color:#767B99">Board at <em>' + seg.stations[0] + '</em> → Alight at <em>' + seg.stations[seg.stations.length-1] + '</em></div>'
        + '<div style="font-size:11px;color:#1A237E;margin-top:2px">Fare: ₹' + segFare.fare + ' (' + segFare.note + ')</div></div>'
        + '<div style="font-size:12px;font-weight:600;color:#1A237E;background:#ECEEF6;border-radius:6px;padding:3px 8px">' + (seg.stations.length-1) + ' stops</div>';
      segList.appendChild(row);
    }
  }, 500);
}
</script>
</body>
</html>
